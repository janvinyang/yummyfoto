<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>杨大文 — 个人作品集</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-bg: #000000;
            --color-surface: #1d1d1f;
            --color-text-primary: #f5f5f7;
            --color-text-secondary: #a1a1a6;
            --color-text-tertiary: #6e6e73;
            --color-accent: #2997ff;
            --color-accent-hover: #59b0ff;
            --color-border: rgba(255, 255, 255, 0.08);
            --color-border-hover: rgba(255, 255, 255, 0.15);
            --font-primary: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --nav-height: 52px;
            --transition-smooth: cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: var(--font-primary);
            background-color: var(--color-bg);
            color: var(--color-text-primary);
            line-height: 1.5;
            overflow-x: hidden;
        }

        ::selection {
            background: var(--color-accent);
            color: #fff;
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            height: 64px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 0.5px solid var(--color-border);
            transition: background 0.3s var(--transition-smooth);
        }

        .nav-inner {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 40px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-brand {
            display: flex;
            align-items: baseline;
            gap: 12px;
        }

        .nav-logo {
            font-size: 17px;
            font-weight: 600;
            letter-spacing: -0.01em;
            color: var(--color-text-primary);
            text-decoration: none;
        }

        .nav-tagline {
            font-size: 13px;
            font-weight: 300;
            color: var(--color-text-tertiary);
            letter-spacing: 0.02em;
        }

        .nav-links {
            display: flex;
            gap: 32px;
            list-style: none;
        }

        .nav-links a {
            font-size: 12px;
            font-weight: 400;
            color: var(--color-text-secondary);
            text-decoration: none;
            letter-spacing: 0.02em;
            transition: color 0.3s var(--transition-smooth);
        }

        .nav-links a:hover {
            color: var(--color-text-primary);
        }

        .nav-menu-btn {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
        }

        .nav-menu-btn svg {
            width: 20px;
            height: 20px;
            stroke: var(--color-text-primary);
        }

        .mobile-menu {
            display: none;
            position: fixed;
            top: var(--nav-height);
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 999;
            padding: 40px;
        }

        .mobile-menu.active {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .mobile-menu a {
            font-size: 28px;
            font-weight: 600;
            color: var(--color-text-primary);
            text-decoration: none;
        }

        .carousel-fullscreen {
            position: relative;
           width: 100%;
            height: calc(100vh - 64px);
            margin-top: 64px;
            overflow: hidden;
            background: #000;
        }

        .carousel-track {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .carousel-slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.8s var(--transition-smooth);
        }

        .carousel-slide.active {
            opacity: 1;
        }

        .carousel-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
        }

        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 0.5px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            transition: all 0.3s var(--transition-smooth);
        }

        .carousel-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .carousel-btn svg {
            width: 20px;
            height: 20px;
            stroke: #fff;
        }

        .carousel-btn-prev { left: 24px; }
        .carousel-btn-next { right: 24px; }

        .carousel-dots {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 10;
        }

        .carousel-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            border: none;
            cursor: pointer;
            padding: 0;
            transition: all 0.3s var(--transition-smooth);
        }

        .carousel-dot.active {
            background: #fff;
            transform: scale(1.3);
        }

        .carousel-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 2px;
            background: var(--color-accent);
            z-index: 10;
            transition: width 0.1s linear;
        }

        .articles-section {
            padding: 120px 40px;
        }

        .articles-inner {
            max-width: 680px;
            margin: 0 auto;
        }

        .articles-eyebrow {
            font-size: 14px;
            font-weight: 500;
            color: var(--color-accent);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .articles-title {
            font-size: clamp(36px, 5vw, 56px);
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.1;
            margin-bottom: 48px;
        }

        .article-list {
            display: flex;
            flex-direction: column;
        }

        .article-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 24px 0;
            border-bottom: 0.5px solid var(--color-border);
            text-decoration: none;
            color: var(--color-text-primary);
            transition: padding-left 0.3s var(--transition-smooth);
        }

        .article-item:first-child {
            border-top: 0.5px solid var(--color-border);
        }

        .article-item:hover {
            padding-left: 12px;
        }

        .article-item-title {
            font-size: 18px;
            font-weight: 500;
            letter-spacing: -0.01em;
        }

        .article-item-arrow {
            flex-shrink: 0;
            width: 20px;
            height: 20px;
            stroke: var(--color-text-tertiary);
            transition: transform 0.3s var(--transition-smooth), stroke 0.3s var(--transition-smooth);
        }

        .article-item:hover .article-item-arrow {
            transform: translateX(4px);
            stroke: var(--color-accent);
        }

        .contact-section {
            text-align: center;
            padding: 120px 40px;
            position: relative;
        }

        .contact-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--color-border), transparent);
        }

        .contact-title {
            font-size: clamp(36px, 5vw, 56px);
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 16px;
        }

        .contact-desc {
            font-size: 18px;
            font-weight: 300;
            color: var(--color-text-secondary);
            max-width: 480px;
            margin: 0 auto 48px;
            line-height: 1.6;
        }

        .contact-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .contact-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            font-size: 15px;
            font-weight: 500;
            font-family: var(--font-primary);
            color: var(--color-text-primary);
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 980px;
            text-decoration: none;
            transition: all 0.3s var(--transition-smooth);
        }

        .contact-link:hover {
            border-color: var(--color-accent);
            background: rgba(41, 151, 255, 0.08);
            transform: translateY(-2px);
        }

        .contact-link svg {
            width: 18px;
            height: 18px;
        }

        footer {
            padding: 32px 40px;
            text-align: center;
            border-top: 0.5px solid var(--color-border);
        }

        footer p {
            font-size: 12px;
            color: var(--color-text-tertiary);
        }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .nav-menu-btn { display: block; }
            .nav-inner { padding: 0 24px; }
            .nav-tagline { display: none; }

            .carousel-fullscreen {
                height: auto;
                padding-top: 75%;
                margin-top: 64px;
            }

            .carousel-fullscreen .carousel-track {
                position: absolute;
                inset: 0;
                height: 100%;
            }

            .carousel-btn { width: 40px; height: 40px; }
            .carousel-btn svg { width: 16px; height: 16px; }
            .carousel-btn-prev { left: 12px; }
            .carousel-btn-next { right: 12px; }

            .articles-section { padding: 80px 24px; }
            .contact-section { padding: 80px 24px; }
            .contact-links { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-inner">
        <div class="nav-brand">
            <a href="#" class="nav-logo">YummyFoto</a>
            <span class="nav-tagline">摄影师 · 视觉创作者</span>
        </div>
        <ul class="nav-links">
            <li><a href="#articles">作品</a></li>
            <li><a href="#contact">联系</a></li>
        </ul>
        <button class="nav-menu-btn" onclick="toggleMobileMenu()" aria-label="菜单">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round">
                <line x1="4" y1="7" x2="20" y2="7"/>
                <line x1="4" y1="12" x2="20" y2="12"/>
                <line x1="4" y1="17" x2="20" y2="17"/>
            </svg>
        </button>
    </div>
</nav>

<div class="mobile-menu" id="mobileMenu">
    <a href="#works" onclick="toggleMobileMenu()">作品</a>
    <a href="#articles" onclick="toggleMobileMenu()">文章</a>
    <a href="#contact" onclick="toggleMobileMenu()">联系</a>
</div>

<div class="carousel-fullscreen" id="works">
    <div class="carousel-track" id="carouselTrack"></div>
    <button class="carousel-btn carousel-btn-prev" id="carouselPrev" aria-label="上一张">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 18l-6-6 6-6"/>
        </svg>
    </button>
    <button class="carousel-btn carousel-btn-next" id="carouselNext" aria-label="下一张">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18l6-6-6-6"/>
        </svg>
    </button>
    <div class="carousel-dots" id="carouselDots"></div>
    <div class="carousel-progress" id="carouselProgress"></div>
</div>

<section class="articles-section" id="articles">
    <div class="articles-inner">
        <p class="articles-eyebrow"></p>
        <h2 class="articles-title">影像作品</h2>
        <div class="article-list" id="articleList"></div>
    </div>
</section>

<section class="contact-section" id="contact">
    <h2 class="contact-title">联系我</h2>
    <p class="contact-desc">无论是商业合作、艺术项目还是交流，均可联系。</p>
    <div class="contact-links">
        <a href="mailto:yangzhanwen@qq.com" class="contact-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="4" width="20" height="16" rx="2"/>
                <path d="M22 4L12 13 2 4"/>
            </svg>
            Email：yangzhanwen@qq.com
        </a>
        <a href="#" class="contact-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/>
            </svg>
            微信：Janvinyang
        </a>
    </div>
</section>

<footer>
    <p>© 2025 Janvinyang. All rights reserved.</p>
</footer>

<script src="images/manifest.js"></script>
<script src="articles.js"></script>
<script>
    function toggleMobileMenu() {
        document.getElementById('mobileMenu').classList.toggle('active');
    }

    const works = (typeof __GALLERY_MANIFEST__ !== 'undefined' && __GALLERY_MANIFEST__.works) ? __GALLERY_MANIFEST__.works : [];
    const articles = (typeof __ARTICLES__ !== 'undefined') ? __ARTICLES__ : [];

    let currentIndex = 0;
    let autoplayTimer = null;
    let progressTimer = null;
    const AUTOPLAY_INTERVAL = 5000;
    const PROGRESS_STEP = 50;

    function buildCarousel() {
        const track = document.getElementById('carouselTrack');
        const dots = document.getElementById('carouselDots');

        if (works.length === 0) {
            track.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--color-text-tertiary);">暂无作品</div>';
            return;
        }

        track.innerHTML = works.map((work, i) => `
            <div class="carousel-slide${i === 0 ? ' active' : ''}" data-index="${i}">
                <img src="${work.src}" alt="${work.title}" loading="${i < 3 ? 'eager' : 'lazy'}">
            </div>
        `).join('');

        dots.innerHTML = works.map((_, i) => `
            <button class="carousel-dot${i === 0 ? ' active' : ''}" data-index="${i}" aria-label="第${i + 1}张"></button>
        `).join('');

        dots.addEventListener('click', (e) => {
            const dot = e.target.closest('.carousel-dot');
            if (dot) goTo(parseInt(dot.dataset.index));
        });

        document.getElementById('carouselPrev').addEventListener('click', () => {
            goTo(currentIndex - 1);
        });

        document.getElementById('carouselNext').addEventListener('click', () => {
            goTo(currentIndex + 1);
        });

        const carousel = document.getElementById('works');
        carousel.addEventListener('mouseenter', pauseAutoplay);
        carousel.addEventListener('mouseleave', startAutoplay);

        carousel.addEventListener('touchstart', (e) => {
            pauseAutoplay();
            carousel._touchStartX = e.touches[0].clientX;
        }, { passive: true });

        carousel.addEventListener('touchend', (e) => {
            const diff = e.changedTouches[0].clientX - carousel._touchStartX;
            if (Math.abs(diff) > 50) {
                diff > 0 ? goTo(currentIndex - 1) : goTo(currentIndex + 1);
            }
            startAutoplay();
        }, { passive: true });

        startAutoplay();
    }

    function goTo(index) {
        if (works.length === 0) return;
        if (index < 0) index = works.length - 1;
        if (index >= works.length) index = 0;

        const slides = document.querySelectorAll('.carousel-slide');
        const dots = document.querySelectorAll('.carousel-dot');

        slides.forEach(s => s.classList.remove('active'));
        dots.forEach(d => d.classList.remove('active'));

        slides[index].classList.add('active');
        dots[index].classList.add('active');

        currentIndex = index;
        resetProgress();
    }

    function startAutoplay() {
        pauseAutoplay();
        resetProgress();
        autoplayTimer = setInterval(() => {
            goTo(currentIndex + 1);
        }, AUTOPLAY_INTERVAL);
    }

    function pauseAutoplay() {
        if (autoplayTimer) { clearInterval(autoplayTimer); autoplayTimer = null; }
        if (progressTimer) { clearInterval(progressTimer); progressTimer = null; }
        document.getElementById('carouselProgress').style.width = '0%';
    }

    function resetProgress() {
        const bar = document.getElementById('carouselProgress');
        bar.style.transition = 'none';
        bar.style.width = '0%';

        if (progressTimer) clearInterval(progressTimer);

        let elapsed = 0;
        progressTimer = setInterval(() => {
            elapsed += PROGRESS_STEP;
            const pct = Math.min((elapsed / AUTOPLAY_INTERVAL) * 100, 100);
            bar.style.transition = 'width 50ms linear';
            bar.style.width = pct + '%';
        }, PROGRESS_STEP);
    }

    function buildArticles() {
        const list = document.getElementById('articleList');
        if (articles.length > 0) {
            list.innerHTML = articles.map(a => `
                <a class="article-item" href="${a.url}" target="_blank" rel="noopener noreferrer">
                    <span class="article-item-title">${a.title}</span>
                    <svg class="article-item-arrow" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </a>
            `).join('');
        } else {
            list.innerHTML = '<p style="color:var(--color-text-tertiary);font-size:15px;">暂无文章</p>';
        }
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') goTo(currentIndex - 1);
        if (e.key === 'ArrowRight') goTo(currentIndex + 1);
    });

    const navEl = document.querySelector('nav');
    window.addEventListener('scroll', () => {
        navEl.style.background = window.scrollY > window.innerHeight * 0.8
            ? 'rgba(0, 0, 0, 0.85)'
            : 'rgba(0, 0, 0, 0.5)';
    }, { passive: true });

    buildCarousel();
    buildArticles();
</script>

</body>
</html>
